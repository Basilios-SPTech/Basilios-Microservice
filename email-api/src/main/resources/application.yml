spring:
  application:
    name: email-api

  # ========== BANCO DE DADOS ==========
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/basilios_email?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:dev}
    password: ${DB_PASSWORD:dev123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # ========== RABBITMQ ==========
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1000
          multiplier: 2.0
          max-attempts: 3
          max-interval: 10000
        default-requeue-rejected: false

  # ========== EMAIL (SMTP) ==========
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 10000
          writetimeout: 10000
    default-encoding: UTF-8
    protocol: smtp

  # ========== JACKSON ==========
  jackson:
    time-zone: America/Sao_Paulo
    locale: pt_BR
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

# ========== SERVIDOR ==========
server:
  port: ${SERVER_PORT:8081}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# ========== ACTUATOR ==========
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    rabbit:
      enabled: true
    mail:
      enabled: true
    db:
      enabled: true

# ========== LOGGING ==========
logging:
  level:
    com.basilios.emailapi: DEBUG
    org.springframework.amqp: INFO
